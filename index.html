<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life Skills MCQ Quiz</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="header-top">
        <div class="logo">
          <div class="logo-icon">LS</div>
          <div>
            <div class="logo-text">Life Skills Exam</div>
            <span class="logo-sub">MCQ Practice</span>
          </div>
        </div>

        <div class="scoreboard">
          <div class="score-pill">
            <span class="val" id="score-current">0</span>
            <span class="lbl"> / </span>
            <span class="val" id="score-total">0</span>
            <span class="lbl">Score</span>
          </div>
          <div class="score-pill">
            <span class="val" id="score-answered">0</span>
            <span class="lbl">Answered</span>
          </div>
          <div class="score-pill">
            <span class="val" id="score-pct">0%</span>
            <span class="lbl">Accuracy</span>
          </div>
        </div>
      </div>

      <div class="progress-wrap">
        <div id="progress-bar"></div>
      </div>

      <div class="tab-wrap" id="unit-tabs"></div>
    </header>

    <main>
      <div id="quiz-container">
        <div class="loading-message">Loading questions…</div>
      </div>
    </main>

    <script src="exam.js" defer></script>
  </body>
</html>
